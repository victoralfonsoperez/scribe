<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <!-- macOS-style squircle clip path -->
    <clipPath id="squircle">
      <path d="
        M 256 12
        C 408 12 500 12 500 104
        C 500 104 500 196 500 256
        C 500 408 500 500 408 500
        C 408 500 316 500 256 500
        C 104 500 12 500 12 408
        C 12 408 12 316 12 256
        C 12 104 12 12 104 12
        C 104 12 196 12 256 12
        Z
      "/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <!-- Background -->
    <rect width="512" height="512" fill="url(#bg)"/>
    <!-- Stylized S letter -->
    <text x="256" y="240" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="300" fill="white" text-anchor="middle" dominant-baseline="central">S</text>
    <!-- Waveform bars centered below the S -->
    <g fill="white" opacity="0.55">
      <rect x="144" y="380" width="16" height="28" rx="8"/>
      <rect x="172" y="366" width="16" height="42" rx="8"/>
      <rect x="200" y="350" width="16" height="58" rx="8"/>
      <rect x="228" y="358" width="16" height="50" rx="8"/>
      <rect x="256" y="344" width="16" height="64" rx="8"/>
      <rect x="284" y="358" width="16" height="50" rx="8"/>
      <rect x="312" y="350" width="16" height="58" rx="8"/>
      <rect x="340" y="366" width="16" height="42" rx="8"/>
      <rect x="368" y="380" width="16" height="28" rx="8"/>
    </g>
  </g>
</svg>
