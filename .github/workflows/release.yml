name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release (arm64)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install

      - name: Build native addon
        run: pnpm run setup

      - name: Build app
        run: pnpm run build

      - name: Build DMG
        run: pnpm exec electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksum
        id: sums
        run: |
          DMG=$(ls release/*.dmg | head -1)
          echo "arm64_sha=$(shasum -a 256 "$DMG" | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: release/*.dmg
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ steps.sums.outputs.version }}
          ARM64_SHA: ${{ steps.sums.outputs.arm64_sha }}
        run: |
          git clone https://x-access-token:${TAP_TOKEN}@github.com/victoralfonsoperez/homebrew-tap.git tap
          mkdir -p tap/Casks
          sed \
            -e "s/VERSION_PLACEHOLDER/${VERSION}/g" \
            -e "s/ARM64_SHA256_PLACEHOLDER/${ARM64_SHA}/g" \
            .github/homebrew/scribe.rb > tap/Casks/scribe.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/scribe.rb
          git diff --cached --quiet || git commit -m "chore: bump scribe to ${VERSION}"
          git push
