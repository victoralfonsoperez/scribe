<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4B5FD"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Stylized S -->
  <text x="256" y="310" font-family="SF Pro Display, Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="280" fill="white" text-anchor="middle" dominant-baseline="central" opacity="0.95">S</text>
  <!-- Waveform bars -->
  <g fill="url(#wave)" opacity="0.7">
    <rect x="80" y="390" width="12" height="30" rx="6"/>
    <rect x="104" y="375" width="12" height="45" rx="6"/>
    <rect x="128" y="360" width="12" height="60" rx="6"/>
    <rect x="152" y="370" width="12" height="50" rx="6"/>
    <rect x="176" y="385" width="12" height="35" rx="6"/>

    <rect x="324" y="390" width="12" height="30" rx="6"/>
    <rect x="348" y="375" width="12" height="45" rx="6"/>
    <rect x="372" y="355" width="12" height="65" rx="6"/>
    <rect x="396" y="370" width="12" height="50" rx="6"/>
    <rect x="420" y="385" width="12" height="35" rx="6"/>
  </g>
</svg>
